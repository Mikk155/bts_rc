name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Isolate tests for release
        run: |
          find scripts/ -type f -name "*.as" -exec sed -i 's/#if SERVER/#if DEBUG/g' {} +

      - name: Compress scripts
        run: |
          zip -r bts_rc.zip scripts/

      - name: Release scripts
        uses: softprops/action-gh-release@v2
        with:
          files: bts_rc.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
