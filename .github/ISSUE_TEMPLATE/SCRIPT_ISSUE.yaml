name: AngelScript issue
description: Report a runtime error, syntax bug, or crash in the map scripts.
title: "[Script Bug] "
labels: [ "bug", "scripts" ]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a scripting bug! Please provide the log details and context below so we can fix it.

  - type: textarea
    id: description
    attributes:
      label: "Description of the Bug"
      description: "A clear description of what the script failure is."
      placeholder: "e.g. The item tracker MOTD popup shows duplicate player names if a player disconnects and reconnects..."
    validations:
      required: true

  - type: input
    id: script-file
    attributes:
      label: "Affected Script File/Function"
      description: "If known, specify which .as script file or namespace is causing the issue."
      placeholder: "e.g. item_tracker.as / UpdateGlobalBuffer()"

  - type: textarea
    id: logs
    attributes:
      label: "AngelScript Compilation / Console Error Logs"
      description: "Paste the exact error logs printed in the server console (e.g. compile errors or runtime script exceptions)."
      placeholder: "e.g. [Angelscript] ERROR: No class called 'weapon_bts_beretta'..."
      render: text
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "Describe the actions that trigger the script error."
      placeholder: |
        1. Connect to the server.
        2. Collect an item inventory.
        3. Press USE + RELOAD to open the MOTD list...
    validations:
      required: false
